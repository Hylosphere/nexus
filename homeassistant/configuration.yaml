
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

template:
  - sensor:
      - name: "Temp Salon"
        unit_of_measurement: "°C"
        state: "18" # Ici, tu forces une valeur fixe pour tester

# --- AJOUT DU THERMOSTAT ---
climate:
  - platform: generic_thermostat
    name: "Radiateur Salon"
    heater: switch.radiateur_salon_radiateur_salon       # L'ID de l'interrupteur sur votre ESP32
    target_sensor: sensor.temp_salon     # ATTENTION : Il faudra un vrai capteur ici plus tard
    min_temp: 15
    max_temp: 25
    target_temp: 19
    cold_tolerance: 0.3
    hot_tolerance: 0.3
    initial_hvac_mode: "heat"